<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Denta — Total Oral Wellness &amp; Aesthetic Dentistry</title>
  <meta name="description" content="Denta — total oral wellness and aesthetic dentistry services. Book a consultation today.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* One shared inset so every edge-anchored block breathes consistently and
         scales with the viewport — no hardcoded page margins. */
      --edge-x: clamp(20px, 3.4vw, 48px);
      --edge-y: clamp(20px, 4.8vh, 48px);

      /* Headline metrics, shared so blocks above the headline can reserve the
         same space it occupies and keep a constant gap from it at any size. */
      --title-fs: clamp(40px, 8.45vw, 120px);
      --title-h:  calc(var(--title-fs) * 0.9 * 3);   /* 3 lines @ line-height .9 */
      --title-gap: clamp(20px, 4vh, 56px);           /* gap above the headline  */
    }

    body { background: #111; font-family: 'Plus Jakarta Sans', sans-serif; }
    a { color: inherit; text-decoration: none; }

    /* Hero fills the whole viewport — this IS the section, no external navbar. */
    #viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #111;
    }

    /* The section fills 100% of the viewport in both axes. All content is
       anchored to the viewport with fluid units, so the layout re-balances to
       the available space instead of letterboxing or cropping. */
    #stage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      color: #FFFFFF;
      z-index: 1;
    }

    /* Background photo covers the viewport at any aspect ratio — no side bands,
       no top/bottom bands, never distorted. Centred so the smile stays framed. */
    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* ---------------- Menu (fluid top bar) ---------------- */
    .menu {
      position: absolute;
      left: var(--edge-x);
      right: var(--edge-x);
      top: var(--edge-y);
      display: flex;
      align-items: center;
      gap: clamp(20px, 3.5vw, 60px);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: none;
    }
    .logo__mark {
      width: clamp(24px, 2.4vw, 32px);
      height: clamp(24px, 2.4vw, 32px);
      flex: none;
      display: flex;
    }
    .logo__mark svg { display: block; width: 100%; height: 100%; }
    .logo__name {
      color: #FFFFFF;
      font-size: clamp(18px, 1.9vw, 26px);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .nav {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: clamp(16px, 2.5vw, 36px);
      flex: 0 1 auto;
      min-width: 0;
    }
    .nav a {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #FFFFFF;
      font-size: clamp(13px, 1.25vw, 18px);
      font-weight: 500;
      line-height: 1.33;
      white-space: nowrap;
    }
    .nav a::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      flex: none;
    }

    .contact {
      margin-left: auto;
      flex: none;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(9px, 1.1vw, 12px) clamp(16px, 1.7vw, 24px);
      background: #FFFFFF;
      border-radius: 100px;
      color: #000000;
      font-size: clamp(13px, 1.25vw, 18px);
      font-weight: 500;
      line-height: 1.33;
      white-space: nowrap;
    }
    .burger-btn {
      display: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    /* ---------------- Annotation (Tip) ---------------- */
    .tip {
      position: absolute;
      /* Anchored by its bottom-right corner (fixed at 34.23% x / 34.5% y, where
         the connector dot pins). Width scales with the viewport; the original
         rectangular ratio is locked with aspect-ratio, so the box keeps its
         shape and only the LEFT/TOP edges move as it compresses. */
      right: 65.77%;    /* 100% - 34.23% → fixes the right edge  */
      bottom: 65.5%;    /* 100% - 34.5%  → fixes the bottom edge */
      width: 22.11%;
      aspect-ratio: 314 / 140;
      border-radius: 10px;
      box-sizing: border-box;
      container-type: size;   /* so children scale in cq units with the box */
      --tip-border: 1px;   /* stroke width          */
      --tip-glow-x: 60px;  /* fade reach along top/bottom edge */
      --tip-glow-y: 45px;  /* fade reach along left/right edge */
    }
    /* Border: white, brightest at the corners, fading to nothing at the
       middle of each edge — drawn as a masked ring (per reference style) */
    .tip::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: var(--tip-border);
      background:
        radial-gradient(var(--tip-glow-x) var(--tip-glow-y) at 0%   0%,   #fff, transparent 100%),
        radial-gradient(var(--tip-glow-x) var(--tip-glow-y) at 100% 0%,   #fff, transparent 100%),
        radial-gradient(var(--tip-glow-x) var(--tip-glow-y) at 100% 100%, #fff, transparent 100%),
        radial-gradient(var(--tip-glow-x) var(--tip-glow-y) at 0%   100%, #fff, transparent 100%);
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    /* Teeth image and label sit INSIDE the box, sized as a percentage of it, so
       they compress with the box and keep the same gaps to the box edges and to
       each other as the original (measured from the 314x140 design box). */
    .veneer-img {
      position: absolute;
      left: 7.32%;      /* 23/314  */
      top: 15.71%;      /* 22/140  */
      width: 35.99%;    /* 113/314 */
      height: 68.57%;   /* 96/140  */
      object-fit: contain;
      object-position: top;
    }
    .veneer-label {
      position: absolute;
      left: 50.32%;     /* 158/314 */
      top: 17.86%;      /* 25/140  */
      width: 52.87%;    /* 166/314 */
      color: #FFFFFF;
      font-size: 7.64cqw;   /* 24/314 */
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: -0.02em;
      text-transform: capitalize;
    }

    /* ---------------- Connector + marker ---------------- */
    .connector {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    /* Centre-anchored on the exact point the connector's dot targets
       (580/1420 = 40.85%, 439/1000 = 43.9%), so the dot always sits at the
       marker's centre and the line follows it at every viewport size. */
    .marker {
      position: absolute;
      left: 40.85%;
      top: 43.9%;
      transform: translate(-50%, -50%);
      width: clamp(44px, 4.5vw, 64px);
      height: clamp(44px, 4.5vw, 64px);
      border-radius: 100px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(2.5px);
      -webkit-backdrop-filter: blur(2.5px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Connector line drawn ABOVE the marker so it reads across the glass to the centre dot */
    .connector--top { z-index: 3; }

    /* Circular endpoint dots, positioned at the line's endpoints in % so they
       track the same points the stretched line connects. Fixed px + 50% radius
       keeps them perfectly round at any viewport aspect. */
    .cdot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FFFFFF;
      transform: translate(-50%, -50%);
      z-index: 3;
      pointer-events: none;
    }
    .cdot--tip    { left: 34.23%; top: 34.5%; }   /* tip box bottom-right corner */
    .cdot--marker { left: 40.85%; top: 43.9%; }   /* 580/1420, 439/1000 — marker centre */

    /* ---------------- Rating ---------------- */
    /* Rating cluster: one width-scaled unit (avatars + text) so the text always
       sits a consistent gap AFTER the avatars and can never overlap them.
       Everything sizes off viewport WIDTH only (vw), like the Book button. */
    .rating {
      position: absolute;
      left: 40.77%;
      bottom: calc(var(--edge-y) + var(--title-fs) * 0.9 * 2);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: clamp(8px, 1vw, 15px);
      z-index: 5;
    }
    .rating-avatars {
      display: flex;
      flex-direction: row;
      align-items: center;
      flex: none;
    }
    .rating-avatars img {
      width: clamp(32px, 4.5vw, 64px);
      height: clamp(32px, 4.5vw, 64px);
      border-radius: 100px;
      object-fit: cover;
    }
    .rating-avatars img:nth-child(1) { z-index: 1; }
    .rating-avatars img:nth-child(2) { margin: 0 clamp(-10px, -0.7vw, -7px); z-index: 2; }
    .rating-avatars img:nth-child(3) { z-index: 3; }

    .rating-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      flex: none;
    }
    .rating-text__count {
      color: #FFFFFF;
      font-size: clamp(14px, 1.69vw, 24px);
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.02em;
      text-transform: capitalize;
    }
    .rating-text__row { display: flex; flex-direction: row; align-items: center; gap: clamp(6px, 0.7vw, 10px); }
    .stars { display: flex; flex-direction: row; gap: 4px; }
    .stars svg { width: clamp(14px, 1.69vw, 24px); height: clamp(14px, 1.69vw, 24px); }
    .rating-text__label {
      color: #FFFFFF;
      font-size: clamp(14px, 1.69vw, 24px);
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.02em;
      text-transform: capitalize;
    }

    /* ---------------- Title ---------------- */
    .title {
      position: absolute;
      left: var(--edge-x);
      right: var(--edge-x);
      bottom: var(--edge-y);
    }
    .title div {
      color: #FFFFFF;
      font-size: var(--title-fs);
      font-weight: 500;
      line-height: 0.9;
      letter-spacing: -0.04em;
      text-transform: capitalize;
    }
    .title .l2 { text-align: right; }

    /* ---------------- Book button ----------------
       Sizes and spaces itself off viewport WIDTH only (vw), scaled from the
       original 1420px design (48px edge, 24/36 padding, 24px text, 28px icon).
       So it shrinks as the width shrinks — keeping the same gaps to the screen
       edges and text as the original — and never changes with height. */
    .book {
      position: absolute;
      right: var(--edge-x);
      bottom: var(--edge-y);
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      padding: clamp(11px, 1.69vw, 24px) clamp(17px, 2.54vw, 36px);
      gap: clamp(6px, 0.7vw, 10px);
      background: #000000;
      border-radius: 100px;
      color: #FFFFFF;
      font-size: clamp(11px, 1.69vw, 24px);
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
      z-index: 4;
    }
    .book svg { flex: none; width: clamp(13px, 1.97vw, 28px); height: clamp(13px, 1.97vw, 28px); }

    /* ---------------- Mobile drawer overlay (matches Denta Mobile handoff) ---------------- */
    .drawer-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      background: rgba(10, 8, 7, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      padding: 22px 20px 28px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
    .drawer-overlay__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .drawer-overlay__logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .drawer-overlay__logo-mark {
      width: 28px;
      height: 28px;
      display: flex;
    }
    .drawer-overlay__logo-mark svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    .drawer-overlay__close {
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      transition: background-color 0.2s ease;
    }
    .drawer-overlay__close:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .drawer-overlay__close svg {
      display: block;
      width: 24px;
      height: 24px;
    }
    .drawer-overlay__nav {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }
    .drawer-overlay__nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #fff;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: -0.02em;
      transition: opacity 0.2s ease;
    }
    .drawer-overlay__nav a:hover {
      opacity: 0.8;
    }
    .drawer-overlay__bullet {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      flex: none;
    }
    .drawer-overlay__contact {
      margin-top: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 24px;
      background: #fff;
      border-radius: 100px;
      color: #000;
      font-size: 18px;
      font-weight: 600;
      transition: background-color 0.2s ease;
    }
    .drawer-overlay__contact:hover {
      background: #e6e6e6;
    }
    /* Open state (toggled on <body>) */
    body.drawer-open .drawer-overlay { opacity: 1; visibility: visible; }
    /* Drawer is a mobile-only element */
    @media (min-width: 641px) {
      .drawer-overlay { display: none; }
    }

    /* The JS-driven mobile connector line is hidden on desktop */
    .mobile-line { display: none; }

    /* ============================================================
       MOBILE / PHONE LAYOUT (CSS-only re-composition of the same markup
       to match the "Denta Mobile" handoff — 390x844 reference).
       The burger (repurposed Contact link) opens the slide-in .drawer.
       ============================================================ */
    @media (max-width: 640px) {
      :root {
        --title-fs: clamp(24px, 7.4vw, 36px);
      }

      /* ---- Top bar: logo left, burger right, nav hidden ---- */
      .menu { top: 22px; left: 20px; right: 20px; gap: 12px; z-index: 6; }
      .nav { display: none; }
      .logo__mark { width: 28px; height: 28px; }
      .logo__name { font-size: 22px; }

      .contact {
        display: none !important;
      }
      .burger-btn {
        margin-left: auto;
        width: 46px;
        height: 46px;
        flex: none;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 100px;
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(2.5px);
        -webkit-backdrop-filter: blur(2.5px);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #fff;
        transition: background-color 0.2s ease;
      }
      .burger-btn svg {
        display: block;
        width: 24px;
        height: 24px;
      }

      /* ---- Annotation / tip (top-left) ---- */
      /* Shift the background photo left (show more of the right side) + slight zoom */
      .bg {
        object-position: 77% center;
        transform: scale(1.28);
        transform-origin: 77% center;
      }

      .tip {
        left: 20px;
        top: 130px;
        right: auto;
        bottom: auto;
        width: min(50vw, 195px);   /* aspect-ratio keeps 314/140 shape */
      }

      /* ---- Marker + connector ----
         On mobile the marker is JS-positioned at the end of the fixed-angle
         connector line, so it lands on the correct tooth at every viewport. */
      .marker {
        width: 52px;
        height: 52px;
        z-index: 2;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(0, 0, 0, 0.2);
      }
      /* The desktop SVG line can't be re-pointed via CSS, so hide it and draw
         the mobile connector via JS-positioned .mobile-line element. */
      .connector { display: none; }
      /* Tip dot pinned to the box's bottom-right corner (tracks the box width) */
      .cdot--tip {
        left: calc(20px + min(50vw, 195px));
        top:  calc(130px + min(50vw, 195px) * 0.4459);   /* 140/314 = box aspect */
      }
      /* Marker dot — JS-positioned to line endpoint */

      /* JS-driven connector line — positioned and rotated by script to always
         bridge the two dots exactly, on every device and aspect ratio. */
      .mobile-line {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        height: 1px;
        background: #FFFFFF;
        transform-origin: 0 0;
        pointer-events: none;
        z-index: 3;
      }

      /* ---- Bottom cluster: rating / title / button stacked full width ---- */
      .book {
        left: 20px;
        right: 20px;
        bottom: 24px;
        width: auto;
        padding: 16px 24px;
        gap: 10px;
        font-size: 18px;
      }
      .book svg { width: 24px; height: 24px; }

      .title {
        left: 20px;
        right: 20px;
        bottom: calc(24px + 50px + 20px);   /* above button (~50px) + gap */
      }
      .title div { font-size: var(--title-fs); line-height: 0.95; white-space: nowrap; }
      .title .l2 { text-align: left; }

      .rating {
        left: 20px;
        /* above the title: button+gap (94px) + title height + gap */
        bottom: calc(114px + var(--title-fs) * 0.95 * 3);
        gap: 12px;
      }
      .rating-avatars img { width: 44px; height: 44px; }
      .rating-avatars img:nth-child(2) { margin: 0 -8px; }
      .rating-text__count,
      .rating-text__label,
      .stars svg { font-size: 18px; }
      .stars svg { width: 18px; height: 18px; }
    }
  </style>
</head>
<body>

    <div id="stage">

      <!-- Background image -->
      <img class="bg" src="assets/smile-bg.png" alt="Close-up of a bright, confident smile">

      <!-- Menu -->
      <div class="menu">
        <a class="logo" href="#" aria-label="Denta home">
          <span class="logo__mark" aria-hidden="true">

              <path d="M2.63101e-06 14.0952C2.72297e-06 13.0432 0.852793 12.1904 1.90476 12.1904L8 12.1904C9.05197 12.1904 9.90476 13.0432 9.90476 14.0952L9.90476 20.1904C9.90476 21.2424 9.05197 22.0952 8 22.0952L1.90476 22.0952C0.852793 22.0952 2.00618e-06 21.2424 2.09814e-06 20.1904L2.63101e-06 14.0952Z" fill="white"/>
            </svg>
          </span>
          <span class="logo__name">Denta</span>
        </a>
        <nav class="nav">
          <a href="#">Implants</a>
          <a href="#">Preventive Care</a>

  <script>
    (function () {
      /* ---- Drawer ---- */
      var burger = document.querySelector('.burger-btn');
      var drawer = document.getElementById('drawer');

      function setOpen(open) {
        document.body.classList.toggle('drawer-open', open);
        burger.setAttribute('aria-expanded', open ? 'true' : 'false');
      }

      burger.addEventListener('click', function (e) {
        e.preventDefault();
        setOpen(true);
      });

      document.querySelectorAll('[data-drawer-close]').forEach(function (el) {
        el.addEventListener('click', function () { setOpen(false); });
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') setOpen(false);
      });

      /* ---- Mobile connector line (JS-driven) ----
         Fixed angle, viewport-scaled length. Marker rides the endpoint. */
      var dotTip     = document.querySelector('.cdot--tip');
      var dotMarker  = document.querySelector('.cdot--marker');
      var mobileLine = document.querySelector('.mobile-line');
      var marker     = document.querySelector('.marker');
      var stage      = document.getElementById('stage');

      var ANGLE_DEG  = 47;                                   /* fixed inclination */
      var ANGLE_RAD  = ANGLE_DEG * Math.PI / 180;

      function updateMobileLine() {
        if (window.innerWidth > 640) {
          /* Back on desktop/tablet: clear the inline styles the mobile pass
             wrote, so the desktop CSS positioning (which lands on the centre
             black circle) takes over again. */
          marker.style.left = '';
          marker.style.top  = '';
          dotMarker.style.left = '';
          dotMarker.style.top  = '';
          mobileLine.style.width = '';
          mobileLine.style.transform = '';
          return;
        }

        var vw = window.innerWidth;
        var length = vw * 0.28;                              /* line scales with viewport width */

        var stageRect = stage.getBoundingClientRect();
        var tipRect   = dotTip.getBoundingClientRect();

        /* Start point: centre of the tip dot, relative to #stage */
        var x1 = tipRect.left + tipRect.width  / 2 - stageRect.left;
        var y1 = tipRect.top  + tipRect.height / 2 - stageRect.top;

        /* End point: fixed angle + scaled length */
        var x2 = x1 + Math.cos(ANGLE_RAD) * length;
        var y2 = y1 + Math.sin(ANGLE_RAD) * length;

        /* Draw the line */
        mobileLine.style.width     = length + 'px';
        mobileLine.style.transform = 'translate(' + x1 + 'px,' + y1 + 'px) rotate(' + ANGLE_DEG + 'deg)';

        /* Move marker circle + dot to the endpoint */
        marker.style.left = x2 + 'px';
        marker.style.top  = y2 + 'px';
        dotMarker.style.left = x2 + 'px';
        dotMarker.style.top  = y2 + 'px';
      }

      updateMobileLine();
      window.addEventListener('resize', updateMobileLine);
      window.addEventListener('orientationchange', function () {
        setTimeout(updateMobileLine, 150);
      });
    })();
  </script>
